name: Test and Tag

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "nvim/doc/**"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run build
        run: go build -v ./...
